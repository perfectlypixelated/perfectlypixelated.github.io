<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perfectlypixelated</title>
    <style>
        :root {
            --bocchi-pink: #e8a7a1;
            --bocchi-yellow: #ffff3d;
            --bocchi-dark: #0d0d0d;
            --bocchi-red: #ff3232;
        }

        body { 
            margin: 0; background: var(--bocchi-dark); color: white;
            font-family: 'Courier New', monospace; /* DIY Zine Aesthetic */
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        /* Glitch Effect Container */
        .glitch-container {
            position: relative;
            cursor: crosshair;
        }

        h1 {
            font-size: 5rem; text-transform: uppercase;
            margin: 0; color: var(--bocchi-pink);
            letter-spacing: -5px; position: relative;
        }

        /* The Glitch Logic */
        .glitch-container:hover h1::before,
        .glitch-container:hover h1::after {
            content: "perfectlypixelated";
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .glitch-container:hover h1::before { color: var(--bocchi-red); left: 3px; animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) infinite; }
        .glitch-container:hover h1::after { color: var(--bocchi-yellow); left: -3px; animation: glitch 0.3s reverse infinite; }

        @keyframes glitch { 0% { clip-path: inset(20% 0 30% 0); } 50% { clip-path: inset(50% 0 10% 0); } 100% { clip-path: inset(10% 0 60% 0); } }

        .desc { color: white; border-left: 4px solid var(--bocchi-pink); padding-left: 15px; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="glitch-container">
        <h1>perfectlypixelated</h1>
        <p class="desc">Back-end Programmer <br> Anxious. Creative. Innotative.</p>
    </div>

</body>
</html>
