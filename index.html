<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>perfectlypixelated</title>
    <style>
        :root { --pink: #e8a7a1; --yellow: #ffff3d; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .bocchi-card { border: 4px solid var(--pink); padding: 2rem; text-align: center; background: rgba(0,0,0,0.8); }
        h1 { color: var(--yellow); text-transform: uppercase; letter-spacing: 5px; }
        
        /* Glitch Effect */
        .glitch:hover { animation: shake 0.2s infinite; color: var(--pink); }
        @keyframes shake { 0% { transform: translate(2px, 1px); } 100% { transform: translate(-2px, -1px); } }

        /* Music Player Styling */
        audio { filter: hue-rotate(270deg) invert(1); margin-top: 20px; }
    </style>
</head>
<body>

    <div class="bocchi-card">
        <h1 class="glitch">perfectlypixelated</h1>
        <p>Guitar Hero... or just anxious? Coding in the dark.</p>
        
        <!-- Placeholder for your character image -->
        <img src="https://via.placeholder.com/150" alt="Bocchi-chan">
        
        <br>
        <audio controls loop>
            <source src="your-rock-music.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
