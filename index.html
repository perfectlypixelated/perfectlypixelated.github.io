<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perfectlypixelated</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #8b5cf6;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Dreamy Animated Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b, #050505);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent);
            filter: blur(120px);
            border-radius: 50%;
            animation: move 15s infinite alternate ease-in-out;
            opacity: 0.3;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 20%); }
        }

        /* Floating Container */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
        }

        h1 { font-size: 3.5rem; margin-bottom: 0.5rem; letter-spacing: -2px; }
        p { font-size: 1.1rem; color: #a1a1aa; margin-bottom: 2rem; }

        .btn {
            padding: 12px 25px;
            background: white;
            color: black;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="gradient-bg">
        <div class="blob"></div>
    </div>

    <main class="container">
        <div class="card">
            <h1>perfectlypixelated</h1>
            <p>Roblox Architect & Web Developer. Crafting high-polish, liquid-motion experiences.</p>
            <a href="https://github.com/perfectlypixelated" class="btn">View Projects</a>
        </div>
    </main>

</body>
</html>
