<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>perfectlypixelated | BOCCHI MODE</title>
    <style>
        :root { --pink: #e8a7a1; --yellow: #ffff3d; --bg: #0d0d0d; --red: #ff3232; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; overflow: hidden;
            /* Halftone Texture Overlay */
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container { 
            border: 6px solid var(--pink); padding: 3rem; background: rgba(0,0,0,0.9);
            text-align: center; position: relative; z-index: 10;
        }

        h1 { color: var(--yellow); font-size: 4rem; margin: 0; cursor: crosshair; }
        
        /* The Glitch Animation */
        .glitch:hover { animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) infinite; color: var(--red); }
        @keyframes glitch { 
            0% { transform: translate(2px, 1px); clip-path: inset(20% 0 30% 0); }
            50% { transform: translate(-2px, -1px); clip-path: inset(50% 0 10% 0); }
            100% { transform: translate(0, 0); clip-path: inset(10% 0 60% 0); }
        }

        .bocchi-img { width: 250px; border: 3px solid var(--yellow); margin: 20px 0; }
        
        /* Styled Audio Player */
        audio { margin-top: 20px; filter: sepia(1) hue-rotate(280deg) saturate(3); }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">PERFECTLYPIXELATED</h1>
        <p>Bocchi the Rock! style developer. Anxious. Creative. Coding in the dark.</p>
        
        <!-- FIX THIS: Ensure image_53df47.png is in an /img folder in your repo -->
        <img src="img/image_53df47.png" alt="Bocchi-chan" class="bocchi-img">
        
        <br>
        <!-- FIX THIS: Ensure your music file is in an /audio folder -->
        <audio controls loop>
            <source src="audio/bocchi-theme.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
